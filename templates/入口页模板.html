<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PASSAGE}}</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --ink: #111827;
      --muted: #5f6b7a;
      --line: rgba(17, 24, 39, 0.12);
      --teal: #176b6b;
      --blue: #3457d5;
      --amber: #a86612;
      --shadow: 0 24px 70px rgba(20, 30, 48, 0.12);
      --soft-shadow: 0 14px 36px rgba(20, 30, 48, 0.09);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(52, 87, 213, 0.10), transparent 34%),
        linear-gradient(215deg, rgba(23, 107, 107, 0.13), transparent 40%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 52%, #fffaf1 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    a { color: inherit; }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.72)),
        linear-gradient(120deg, rgba(23, 107, 107, 0.10), rgba(52, 87, 213, 0.08));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.72) 42%, transparent 66%);
      transform: translateX(-120%);
      animation: light-sweep 6s ease-in-out infinite;
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin: 0 0 14px;
      padding: 3px 10px;
      border: 1px solid rgba(23, 107, 107, 0.25);
      border-radius: 999px;
      color: var(--teal);
      background: rgba(23, 107, 107, 0.08);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      position: relative;
      margin: 0;
      max-width: 760px;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .lead {
      position: relative;
      max-width: 720px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
    }

    .actions {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 8px 24px rgba(20, 30, 48, 0.07);
      color: var(--ink);
      text-decoration: none;
      font-weight: 850;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .button.primary {
      border-color: rgba(23, 107, 107, 0.42);
      background: linear-gradient(135deg, #176b6b, #244ea8);
      color: #fff;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(52, 87, 213, 0.38);
      box-shadow: var(--soft-shadow);
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .step {
      display: block;
      position: relative;
      overflow: hidden;
      min-height: 154px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(14px);
      color: var(--ink);
      text-decoration: none;
      animation: rise 520ms ease both;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .step:hover {
      transform: translateY(-3px);
      border-color: rgba(52, 87, 213, 0.30);
      box-shadow: 0 18px 46px rgba(20, 30, 48, 0.11);
    }

    .step:nth-child(2) { animation-delay: 70ms; }
    .step:nth-child(3) { animation-delay: 140ms; }
    .step:nth-child(4) { animation-delay: 210ms; }

    .step::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--amber));
      opacity: 0.9;
    }

    .num {
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .step h2 {
      margin: 10px 0 8px;
      font-size: 19px;
      letter-spacing: 0;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    @keyframes light-sweep {
      0%, 55% { transform: translateX(-120%); opacity: 0; }
      68% { opacity: 0.75; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 860px) {
      .flow { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .page { width: min(100% - 20px, 1120px); padding-top: 18px; }
      .hero { padding: 24px; }
      .actions { display: grid; }
      .button { width: 100%; }
      .flow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="查经包入口">
      <p class="eyebrow">阅读流程</p>
      <h1>{{PASSAGE}}</h1>
      <p class="lead">{{SUMMARY}}</p>
    </section>

    <section class="flow" aria-label="内容索引">
      <a class="step" href="{{STUDY_HTML}}#source">
        <span class="num">01</span>
        <h2>读经前</h2>
        <p>历史背景、上下文、重要人物与地理关系放在前面。</p>
      </a>
      <a class="step" href="{{STUDY_HTML}}#sermon">
        <span class="num">02</span>
        <h2>讲道角度</h2>
        <p>整理 David Pawson 或指定牧师可核对的讲道方向。</p>
      </a>
      <a class="step" href="{{STUDY_HTML}}#summary">
        <span class="num">03</span>
        <h2>读经后</h2>
        <p>短总结、前后文呼应、旧约或新约线索。</p>
      </a>
      <a class="step" href="{{QUIZ_HTML}}">
        <span class="num">04</span>
        <h2>互动题</h2>
        <p>选择题、自动检查、错题解释经文大意。</p>
      </a>
    </section>
  </main>
</body>
</html>
